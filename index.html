<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Katalog Part Mobil Hyundai Getz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
        }
        header {
            background: #222;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-body {
            padding: 15px;
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
        }
        .card-desc {
            font-size: 14px;
            color: #555;
            margin: 10px 0;
        }
        .price {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Katalog Part Mobil</h1>
    <p>Hyundai Getz 2003</p>
</header>

<div class="container">

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Lampu Sein">
        <div class="card-body">
            <div class="card-title">Lampu Sein Kiri</div>
            <div class="card-desc">Kondisi baru, cocok untuk Hyundai Getz 2003.</div>
            <div class="price">Rp 150.000</div>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Filter Oli">
        <div class="card-body">
            <div class="card-title">Filter Oli</div>
            <div class="card-desc">Universal, cocok berbagai mobil termasuk Getz.</div>
            <div class="price">Rp 50.000</div>
        </div>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Aki Mobil">
        <div class="card-body">
            <div class="card-title">Aki N50</div>
            <div class="card-desc">Aki kering, siap pakai, daya tahan tinggi.</div>
            <div class="price">Rp 900.000</div>
        </div>
    </div>

</div>

</body>
</html>
